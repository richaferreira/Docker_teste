<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nginx Server</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 100%);
            color: #00d9ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            border: 2px solid #00d9ff;
            padding: 40px;
            background: rgba(0, 217, 255, 0.05);
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.3);
            max-width: 600px;
        }
        
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0, 217, 255, 0.5);
            color: #00d9ff;
        }
        
        .status {
            font-size: 1.2em;
            margin: 20px 0;
            padding: 15px;
            background: rgba(0, 255, 136, 0.1);
            border-left: 4px solid #00ff88;
        }
        
        .info {
            margin-top: 30px;
            text-align: left;
            font-size: 0.9em;
            line-height: 1.8;
        }
        
        .timestamp {
            margin-top: 20px;
            font-size: 0.8em;
            color: #00ff88;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ NGINX</h1>
        <div class="status">
            ✓ Nginx Server is running
        </div>
        <div class="info">
            <p><strong>Server:</strong> Nginx Web Server</p>
            <p><strong>Port:</strong> 80 (mapped to 8081)</p>
            <p><strong>Status:</strong> ONLINE</p>
            <p><strong>Container:</strong> docker-compose-nginx</p>
        </div>
        <div class="timestamp">
            <p>Generated: <span id="timestamp"></span></p>
        </div>
    </div>
    
    <script>
        document.getElementById('timestamp').textContent = new Date().toLocaleString();
    </script>
</body>
</html>
